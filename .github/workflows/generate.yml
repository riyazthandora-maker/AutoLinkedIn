name: Generate LinkedIn Post

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:       # Manual trigger for testing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate post and send email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_post.py

      - name: Commit draft
        run: |
          git config user.name "linkedin-bot"
          git config user.email "github-actions@github.com"
          git add drafts/latest.md
          git diff --cached --quiet || git commit -m "chore: update LinkedIn draft [skip ci]"
          git push
